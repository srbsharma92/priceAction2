name: Update Screener Data

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'   # every 5 min, ~03:30-10:00 UTC (~09:00-15:30 IST), Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python screener_job.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_data.xlsx
          git diff --staged --quiet || git commit -m "Update screener data [skip ci]"
          git push
